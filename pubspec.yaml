name: marfeel_sdk
description: Flutter plugin for Marfeel Compass analytics SDK
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.marfeel.flutter
        pluginClass: MarfeelSdkPlugin
      ios:
        pluginClass: MarfeelSdkPlugin
