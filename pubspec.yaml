name: marfeel_sdk
description: Flutter plugin for the Marfeel Compass analytics SDK. Track page views, scroll depth, multimedia events, conversions, and user engagement.
version: 0.1.0
homepage: https://www.marfeel.com
repository: https://github.com/Marfeel/MarfeelSDK-Flutter
issue_tracker: https://github.com/Marfeel/MarfeelSDK-Flutter/issues
topics:
  - analytics
  - tracking
  - marfeel

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.marfeel.flutter
        pluginClass: MarfeelSdkPlugin
      ios:
        pluginClass: MarfeelSdkPlugin
